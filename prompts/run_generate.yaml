name: run_generate
system: "Follow the rulebook strictly. Return only the final output as YAML. No markdown fences. No commentary. Do not repeat examples, schema, or input."
user_template: |-
  Rulebook:
  {rulebook}

  Input:
  {input_text}

  Examples:
  {examples_text}

  Output schema:
  {schema_text}

  Return only the output YAML object (no input block, no examples, no schema).

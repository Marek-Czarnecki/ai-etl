services:
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  ollama-init:
    image: ollama/ollama:latest
    depends_on:
      - ollama
    environment:
      OLLAMA_HOST: ollama:11434
    tty: true
    stdin_open: true
    entrypoint: ["sh", "-c", "ollama pull llama3.2:1b"]
    restart: "no"

  chromadb-server:
    image: chromadb/chroma:latest
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/chroma/chroma

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    ports:
      - "3000:8080"
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
    volumes:
      - open_webui_data:/app/backend/data
    depends_on:
      - ollama

  ai-etl:
    build:
      context: .
      dockerfile: docker/Dockerfile
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
      CHROMA_URL: http://chromadb-server:8000
    volumes:
      - ai_etl_out:/app/out
    depends_on:
      - ollama
      - chromadb-server

volumes:
  ollama_data:
  chroma_data:
  open_webui_data:
  ai_etl_out:

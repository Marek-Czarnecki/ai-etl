controls:
  - control_id: "CTRL-001"
    title: "Pay invoices within 30 days"
    description: "Ensure undisputed invoices are paid within 30 days of the invoice date."
    severity: "Medium"
    rationale: "Section 1.1 sets a 30-day payment window."
  - control_id: "CTRL-002"
    title: "Subcontractor approval"
    description: "Do not engage subcontractors without prior written approval."
    severity: "High"
    rationale: "Section 2.3 requires written approval before engagement."
  - control_id: "CTRL-003"
    title: "Provide audit records promptly"
    description: "Provide requested records within 5 business days."
    severity: "Medium"
    rationale: "Section 4.6 sets the response window for audit requests."
  - control_id: "CTRL-004"
    title: "Data incident notice"
    description: "Notify the customer of any data incident within 24 hours."
    severity: "High"
    rationale: "Section 3.4 requires notice within 24 hours."
  - control_id: "CTRL-005"
    title: "Disclose open-source components"
    description: "Disclose any open-source components included in deliverables."
    severity: "Low"
    rationale: "Section 5.8 requires open-source disclosure."
  - control_id: "CTRL-006"
    title: "Cure period for breach"
    description: "Cure material breach within 15 days after notice."
    severity: "Medium"
    rationale: "Section 6.9 defines the 15-day cure period."

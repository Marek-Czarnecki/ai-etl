controls:
  - control_id: "CTRL-001"
    title: "Verify Nevarel allergy"
    description: "Do not order Nevarel when a documented Nevarel allergy is present."
    severity: "High"
    rationale: "Section 2.3 prohibits Nevarel orders for documented allergy."
  - control_id: "CTRL-002"
    title: "Check renal function before Nevarel"
    description: "Do not order Nevarel if the most recent eGFR is below 30."
    severity: "High"
    rationale: "Section 2.4 sets a renal threshold for Nevarel use."
  - control_id: "CTRL-003"
    title: "Follow-up hemoglobin for high-dose Nevarel"
    description: "If Nevarel dose exceeds 200 mg, hemoglobin must be rechecked within 48 hours."
    severity: "Medium"
    rationale: "Section 2.5 requires timely follow-up labs for high doses."
  - control_id: "CTRL-004"
    title: "Pregnancy exception documentation"
    description: "Nevarel must not be ordered for pregnant patients unless an exception is documented."
    severity: "Medium"
    rationale: "Section 2.6 requires documented exceptions for pregnancy."
  - control_id: "CTRL-005"
    title: "Potassium check for CardioFlux"
    description: "CardioFlux doses above 50 mg require potassium at or below 5.5 mmol/L."
    severity: "High"
    rationale: "Section 3.7 sets the potassium threshold before higher doses."
  - control_id: "CTRL-006"
    title: "Systolic blood pressure before VasoLift"
    description: "Do not start VasoLift infusion when systolic blood pressure is below 90 mmHg."
    severity: "High"
    rationale: "Section 4.8 prohibits initiation under hypotension."
  - control_id: "CTRL-007"
    title: "Document Zyphra indication"
    description: "Zyphra orders require the indication field to be completed."
    severity: "Low"
    rationale: "Section 5.9 requires completed indication documentation."

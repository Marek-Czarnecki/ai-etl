requirements:
  - requirement_id: "REQ-001"
    title: "Nevarel allergy contraindication"
    description: "Flag Nevarel orders when a Nevarel allergy is documented."
    severity: "High"
    control_ids:
      - "CTRL-001"
    detection_logic: "if event_type == \"med_order\" and medication == \"Nevarel\" and allergy contains \"Nevarel\""
  - requirement_id: "REQ-002"
    title: "Nevarel renal threshold"
    description: "Flag Nevarel orders when eGFR is below 30."
    severity: "High"
    control_ids:
      - "CTRL-002"
    detection_logic: "if event_type == \"med_order\" and medication == \"Nevarel\" and lab_name == \"eGFR\" and lab_value < 30"
  - requirement_id: "REQ-003"
    title: "High-dose Nevarel follow-up"
    description: "Flag high-dose Nevarel orders when follow-up hemoglobin is scheduled beyond 48 hours."
    severity: "Medium"
    control_ids:
      - "CTRL-003"
    detection_logic: "if event_type == \"med_order\" and medication == \"Nevarel\" and dose_mg > 200 and follow_up_days > 2"
  - requirement_id: "REQ-004"
    title: "Nevarel pregnancy exception"
    description: "Flag Nevarel orders for pregnant patients without documented exceptions."
    severity: "Medium"
    control_ids:
      - "CTRL-004"
    detection_logic: "if event_type == \"med_order\" and medication == \"Nevarel\" and pregnancy_status == \"Pregnant\" and documentation_complete != \"yes\""
  - requirement_id: "REQ-005"
    title: "CardioFlux potassium threshold"
    description: "Flag CardioFlux orders above 50 mg when potassium exceeds 5.5 mmol/L."
    severity: "High"
    control_ids:
      - "CTRL-005"
    detection_logic: "if event_type == \"med_order\" and medication == \"CardioFlux\" and dose_mg > 50 and lab_name == \"Potassium\" and lab_value > 5.5"
  - requirement_id: "REQ-006"
    title: "VasoLift hypotension check"
    description: "Flag VasoLift infusions when systolic blood pressure is below 90."
    severity: "High"
    control_ids:
      - "CTRL-006"
    detection_logic: "if event_type == \"infusion\" and medication == \"VasoLift\" and systolic_bp < 90"
  - requirement_id: "REQ-007"
    title: "Zyphra indication documentation"
    description: "Flag Zyphra orders when the indication field is not completed."
    severity: "Low"
    control_ids:
      - "CTRL-007"
    detection_logic: "if event_type == \"med_order\" and medication == \"Zyphra\" and documentation_complete != \"yes\""
